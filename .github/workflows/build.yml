name: Docker build

on:
  - push

concurrency:
  group: docker-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker build (${{ matrix.arch.name }})
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: "amd64"
            runner: "ubuntu-24.04"
          - name: "arm64"
            runner: "ubuntu-24.04-arm"

    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
      packages: write

    outputs:
      repo: ${{ steps.ghcr-repo.outputs.repo }}
      meta: ${{ steps.meta.outputs.json }}

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: ThePalaceProject/circulation/.github/actions/poetry@main
        with:
          version: "2.1.1"

      - name: Setup Dunamai
        run: |
          poetry install --only ci
        env:
          POETRY_VIRTUALENVS_CREATE: false

      - name: Create version file
        run: |
          echo "__version__ = '$(dunamai from git --style semver)'" >> virtual_library_card/_version.py
          echo "__commit__ = '$(dunamai from git --format {commit} --full-commit)'" >> virtual_library_card/_version.py
          echo "__branch__ = '$(dunamai from git --format {branch})'" >> virtual_library_card/_version.py

      # Docker doesn't support uppercase letters in repo names, so we need to lowercase the owner
      - name: Set output repo
        id: ghcr-repo
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/virtual-library-card"
          echo "repo=$repo"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"

      # See comment here: https://github.com/actions/runner-images/issues/1187#issuecomment-686735760
      - name: Disable network offload
        run: sudo ethtool -K eth0 tx off rx off

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.ghcr-repo.outputs.repo }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }},priority=10
            type=semver,pattern={{major}}.{{minor}},priority=10
            type=semver,pattern={{version}},priority=20
            type=ref,event=branch,priority=30
            type=sha,priority=40

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=${{ steps.ghcr-repo.outputs.repo }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digests
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digests
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch.name }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  unit-test:
    name: Unit tests (${{ matrix.arch.name }})
    runs-on: ${{ matrix.arch.runner }}
    needs: [build]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: "amd64"
            runner: "ubuntu-24.04"
          - name: "arm64"
            runner: "ubuntu-24.04-arm"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.arch.name }}
          merge-multiple: true

      # This sets the environment variable referenced in the docker-compose file
      # for the image to use for the vlc container to the digest of the image
      # that was built in the build job.
      - name: Set VLC image
        working-directory: ${{ runner.temp }}/digests
        run: |
          IMAGE="${{ needs.build.outputs.repo }}$(printf '@sha256:%s' *)"
          echo "$IMAGE"
          echo "VLC_IMAGE=$IMAGE" >> $GITHUB_ENV

      # See comment here: https://github.com/actions/runner-images/issues/1187#issuecomment-686735760
      - name: Disable network offload
        run: sudo ethtool -K eth0 tx off rx off

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: >
          docker compose run -v ${{ github.workspace }}/tests:/virtual_library_card/tests vlc
          bash -c "poetry install --only dev --no-interaction && python manage.py migrate --no-input && pytest --no-cov tests"

      - name: Stop containers
        if: always()
        run: docker compose down

  integration-test:
    name: Integration test (${{ matrix.arch.name }})
    runs-on: ${{ matrix.arch.runner }}
    needs: [build]
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: "amd64"
            runner: "ubuntu-24.04"
          - name: "arm64"
            runner: "ubuntu-24.04-arm"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.arch.name }}
          merge-multiple: true

      # This sets the environment variable referenced in the docker-compose file
      # for the image to use for the vlc container to the digest of the image
      # that was built in the build job.
      - name: Set VLC image
        working-directory: ${{ runner.temp }}/digests
        run: |
          IMAGE="${{ needs.build.outputs.repo }}$(printf '@sha256:%s' *)"
          echo "$IMAGE"
          echo "VLC_IMAGE=$IMAGE" >> $GITHUB_ENV

      # See comment here: https://github.com/actions/runner-images/issues/1187#issuecomment-686735760
      - name: Disable network offload
        run: sudo ethtool -K eth0 tx off rx off

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & Start containers
        run: docker compose up -d

      - name: Run integration tests
        run: ./docker/ci/test_webapp.sh

      - name: Output logs
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down

  push:
    name: Tag & Push Image
    runs-on: ubuntu-24.04
    needs: [build, unit-test, integration-test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest & push
        working-directory: ${{ runner.temp }}/digests
        run: >
          docker buildx imagetools create
          $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ needs.build.outputs.meta }}')
          $(printf '${{ needs.build.outputs.repo }}@sha256:%s ' *)
